<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMAZK :: videos</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#888; font-family:'Courier New',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; padding:2rem; }
  .panel-title { font-size:10px; color:#444; letter-spacing:0.2em; border-bottom:0.5px solid #111; padding-bottom:8px; width:100%; max-width:500px; }
  .back { font-size:10px; color:#333; letter-spacing:0.15em; background:none; border:none; font-family:'Courier New',monospace; text-transform:uppercase; text-decoration:none; display:block; width:100%; max-width:500px; cursor:pointer; }
  .back:hover { color:#666; }
  .video-list { display:flex; flex-direction:column; gap:12px; width:100%; max-width:500px; }
  .video-item { border:0.5px solid #1a1a1a; padding:12px 16px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px; }
  .video-item:hover { border-color:#333; }
  .video-num { font-size:9px; color:#222; letter-spacing:0.15em; min-width:32px; }
  .video-label { font-size:11px; color:#333; letter-spacing:0.12em; }
  .video-sub { font-size:9px; color:#1a1a1a; letter-spacing:0.1em; margin-top:4px; }
  .footer-deco { font-size:9px; color:#111; letter-spacing:0.15em; margin-top:2rem; }
</style>
</head>
<body>

<a class="back" href="index.html">&lt; back</a>
<div class="panel-title">&gt;_ videos :: 3 entries found</div>

<div class="video-list">
  <div class="video-item" id="v0">
    <div class="video-num">[01]</div>
    <div>
      <div class="video-label">file_01.mp4</div>
      <div class="video-sub">external :: stream</div>
    </div>
  </div>
  <div class="video-item" id="v1">
    <div class="video-num">[02]</div>
    <div>
      <div class="video-label">file_02.mp4</div>
      <div class="video-sub">external :: stream</div>
    </div>
  </div>
  <div class="video-item" id="v2">
    <div class="video-num">[03]</div>
    <div>
      <div class="video-label">file_03.mp4</div>
      <div class="video-sub">external :: stream</div>
    </div>
  </div>
</div>

<div class="footer-deco">&gt;_ access granted :: mitska</div>

<script>
const k = 'kmazk';
function xor(str) {
  return Array.from(str).map((c,i) => c.charCodeAt(0) ^ k.charCodeAt(i % k.length));
}
function deXor(arr) {
  return arr.map((c,i) => String.fromCharCode(c ^ k.charCodeAt(i % k.length))).join('');
}

// links cifrados al momento de cargar la página
const raw = [
  'https://youtube.com/shorts/oTI7hqZjKXo?si=K1jFrtDq_BJ7i2zS',
  'https://youtu.be/MEQtKGpBinE?si=fC_4NihGzu_v0Cn4',
  'https://youtu.be/9CEsoEfzKfI?si=OkfexmVhRA6Dneyd'
];
const enc = raw.map(xor);

document.getElementById('v0').onclick = () => window.open(deXor(enc[0]), '_blank');
document.getElementById('v1').onclick = () => window.open(deXor(enc[1]), '_blank');
document.getElementById('v2').onclick = () => window.open(deXor(enc[2]), '_blank');
</script>
</body>
</html>
